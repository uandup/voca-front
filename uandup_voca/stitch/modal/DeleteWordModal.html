<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Scholarly Curator - Delete Confirmation</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#ffdbd1",
              "outline-variant": "#c4c5d4",
              "on-primary": "#ffffff",
              "secondary-fixed-dim": "#bbc5f1",
              surface: "#faf8ff",
              "on-background": "#1a1b21",
              background: "#faf8ff",
              "surface-dim": "#dad9e2",
              tertiary: "#460d00",
              "secondary-container": "#c9d3ff",
              "error-container": "#ffdad6",
              "surface-container": "#eeedf6",
              "surface-container-high": "#e8e7f0",
              "primary-fixed": "#dce1ff",
              "secondary-fixed": "#dce1ff",
              "on-secondary-container": "#505a80",
              "inverse-on-surface": "#f1f0f9",
              "tertiary-fixed-dim": "#ffb5a0",
              "surface-container-low": "#f4f2fb",
              "on-secondary-fixed": "#0f193c",
              error: "#ba1a1a",
              "primary-fixed-dim": "#b6c4ff",
              "on-tertiary-container": "#f67f5c",
              "on-tertiary": "#ffffff",
              secondary: "#535d83",
              "on-primary-container": "#809bff",
              "inverse-primary": "#b6c4ff",
              "on-error-container": "#93000a",
              "surface-tint": "#3a57b8",
              primary: "#001b5f",
              "on-secondary-fixed-variant": "#3b456a",
              "on-tertiary-fixed": "#3b0900",
              "on-primary-fixed-variant": "#1d3e9f",
              "primary-container": "#002d8f",
              "surface-bright": "#faf8ff",
              "on-surface-variant": "#444652",
              "tertiary-container": "#6c1900",
              "on-error": "#ffffff",
              outline: "#747684",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-fixed-variant": "#81280c",
              "on-secondary": "#ffffff",
              "inverse-surface": "#2f3037",
              "surface-variant": "#e3e1ea",
              "on-primary-fixed": "#001550",
              "on-surface": "#1a1b21",
              "surface-container-highest": "#e3e1ea",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .premium-shadow {
        box-shadow: 0px 8px 32px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>
  <body
    class="bg-[#f0f2f5] font-body text-on-surface min-h-screen flex items-center justify-center p-6"
  >
    <!-- Clean Centered Modal -->
    <div
      class="w-full max-w-[440px] bg-white rounded-3xl premium-shadow overflow-hidden flex flex-col animate-in fade-in zoom-in duration-300"
    >
      <!-- Modal Content -->
      <div class="p-8 pb-6 flex flex-col items-center text-center">
        <!-- Prominent Warning Icon -->
        <div
          class="w-16 h-16 bg-error/10 rounded-2xl flex items-center justify-center mb-6"
        >
          <span
            class="material-symbols-outlined text-error text-4xl"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >delete_forever</span
          >
        </div>
        <h2
          class="text-2xl font-extrabold font-headline text-on-surface mb-3 tracking-tight"
        >
          Delete Word?
        </h2>
        <p class="text-on-surface-variant font-body leading-relaxed text-sm">
          This action will permanently remove
          <span class="font-bold text-on-surface">"Ephemeral"</span> from your
          curriculum. This cannot be undone.
        </p>
      </div>
      <!-- Deletion Context Block -->
      <div
        class="mx-8 mb-8 p-4 bg-surface-container-low rounded-2xl border border-outline-variant/30"
      >
        <div class="flex flex-col gap-1 items-start text-left">
          <p
            class="text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.15em] font-label"
          >
            Confirming Deletion for:
          </p>
          <div class="flex items-center gap-2">
            <span class="font-headline font-bold text-lg text-primary"
              >Ephemeral</span
            >
            <span class="text-xs text-on-surface-variant italic"
              >/əˈfem(ə)rəl/</span
            >
          </div>
        </div>
      </div>
      <!-- Action Buttons -->
      <div class="px-8 pb-8 flex flex-col gap-3">
        <button
          class="w-full bg-error text-white px-6 py-4 rounded-2xl font-bold shadow-lg shadow-error/20 active:scale-[0.98] transition-all text-base font-headline"
        >
          Delete Word
        </button>
        <button
          class="w-full bg-surface-container-high hover:bg-surface-dim text-on-surface font-bold px-6 py-4 rounded-2xl transition-all active:scale-[0.98] text-base font-headline"
        >
          Cancel
        </button>
      </div>
    </div>
  </body>
</html>
