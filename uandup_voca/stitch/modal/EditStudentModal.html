<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#f4f2fb",
              "on-tertiary-fixed": "#3b0900",
              "surface-container-lowest": "#ffffff",
              "outline-variant": "#c4c5d4",
              "tertiary-fixed": "#ffdbd1",
              "on-tertiary-container": "#f67f5c",
              "surface-dim": "#dad9e2",
              "on-secondary-container": "#505a80",
              background: "#faf8ff",
              "primary-fixed": "#dce1ff",
              "surface-container-high": "#e8e7f0",
              surface: "#faf8ff",
              "primary-fixed-dim": "#b6c4ff",
              "on-primary": "#ffffff",
              "on-secondary": "#ffffff",
              "inverse-primary": "#b6c4ff",
              "tertiary-fixed-dim": "#ffb5a0",
              "secondary-container": "#c9d3ff",
              "error-container": "#ffdad6",
              error: "#ba1a1a",
              "on-secondary-fixed-variant": "#3b456a",
              "surface-container": "#eeedf6",
              "on-tertiary-fixed-variant": "#81280c",
              "on-tertiary": "#ffffff",
              "tertiary-container": "#6c1900",
              tertiary: "#460d00",
              "on-background": "#1a1b21",
              "surface-tint": "#3a57b8",
              "secondary-fixed-dim": "#bbc5f1",
              secondary: "#535d83",
              "inverse-surface": "#2f3037",
              "surface-bright": "#faf8ff",
              outline: "#747684",
              "secondary-fixed": "#dce1ff",
              primary: "#002D8F",
              "on-secondary-fixed": "#0f193c",
              "surface-variant": "#e3e1ea",
              "inverse-on-surface": "#f1f0f9",
              "primary-container": "#002d8f",
              "on-primary-fixed-variant": "#1d3e9f",
              "surface-container-highest": "#e3e1ea",
              "on-primary-container": "#809bff",
              "on-error": "#ffffff",
              "on-surface-variant": "#444652",
              "on-surface": "#1a1b21",
              "on-primary-fixed": "#001550",
              "on-error-container": "#93000a",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: #faf8ff;
        color: #1a1b21;
      }
      h1,
      h2,
      h3,
      h4 {
        font-family: "Manrope", sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-slate-200/50 flex items-center justify-center min-h-screen p-4"
  >
    <!-- Edit Student Modal -->
    <div
      class="fixed inset-0 z-[60] flex items-center justify-center"
      id="edit-student-modal"
    >
      <!-- Overlay / Backdrop -->
      <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
      <!-- Modal Content Container -->
      <div
        class="relative bg-white dark:bg-slate-900 w-full max-w-lg mx-4 rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300"
      >
        <!-- Header -->
        <div
          class="px-8 py-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between"
        >
          <h3 class="text-xl font-bold text-primary font-headline">
            Edit Student Information
          </h3>
          <button
            class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors p-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <!-- Form Body -->
        <form class="p-8 space-y-6">
          <!-- Student Name -->
          <div class="space-y-2">
            <label
              class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.1em] font-label block"
              >Student Name</label
            >
            <div class="relative group">
              <input
                class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-3 px-4 text-sm font-medium focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all font-body text-slate-900 dark:text-slate-100"
                placeholder="Enter full name"
                type="text"
                value="Elena Vance"
              />
            </div>
          </div>
          <div class="grid grid-cols-2 gap-6">
            <!-- Grade -->
            <div class="space-y-2">
              <label
                class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.1em] font-label block"
                >Grade</label
              >
              <div class="relative">
                <select
                  class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-3 pl-4 pr-10 text-sm font-medium focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none appearance-none cursor-pointer font-body text-slate-900 dark:text-slate-100"
                >
                  <option value="10">Grade 10</option>
                  <option selected="" value="11">Grade 11</option>
                  <option value="12">Grade 12</option>
                </select>
                <span
                  class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xl"
                  >expand_more</span
                >
              </div>
            </div>
            <!-- Difficulty Level -->
            <div class="space-y-2">
              <label
                class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.1em] font-label block"
                >Difficulty Level</label
              >
              <div class="relative">
                <select
                  class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-3 pl-4 pr-10 text-sm font-medium focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none appearance-none cursor-pointer font-body text-slate-900 dark:text-slate-100"
                >
                  <option value="1">Level 1</option>
                  <option value="2">Level 2</option>
                  <option value="3">Level 3</option>
                  <option selected="" value="4">Level 4</option>
                  <option value="5">Level 5</option>
                </select>
                <span
                  class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xl"
                  >expand_more</span
                >
              </div>
            </div>
          </div>
          <!-- Word Count -->
          <div class="space-y-2">
            <label
              class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.1em] font-label block"
              >Assigned Word Count</label
            >
            <div class="relative">
              <input
                class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-3 px-4 text-sm font-medium focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all font-body text-slate-900 dark:text-slate-100"
                type="number"
                value="40"
              />
              <span
                class="absolute right-4 top-1/2 -translate-y-1/2 text-xs font-semibold text-slate-400"
                >words</span
              >
            </div>
          </div>
        </form>
        <!-- Footer -->
        <div
          class="px-8 py-6 bg-slate-50/50 dark:bg-slate-800/30 border-t border-slate-100 dark:border-slate-800 flex items-center justify-end gap-4"
        >
          <button
            class="px-6 py-2.5 rounded-xl text-sm font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all font-body"
          >
            Cancel
          </button>
          <button
            class="px-8 py-2.5 rounded-xl bg-primary text-white text-sm font-bold shadow-[0_4px_12px_rgba(0,45,143,0.3)] hover:shadow-[0_6px_16px_rgba(0,45,143,0.4)] hover:-translate-y-0.5 transition-all active:translate-y-0 font-body"
          >
            Save Changes
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
