<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Lexicon Scholar - Add New Word</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-tint": "#3a57b8",
              outline: "#747684",
              "on-secondary-container": "#505a80",
              "surface-bright": "#faf8ff",
              surface: "#faf8ff",
              "on-secondary-fixed-variant": "#3b456a",
              "on-primary-fixed-variant": "#1d3e9f",
              "surface-container-highest": "#e3e1ea",
              background: "#faf8ff",
              "primary-fixed": "#dce1ff",
              "surface-variant": "#e3e1ea",
              "surface-container-high": "#e8e7f0",
              "secondary-fixed-dim": "#bbc5f1",
              "surface-container-lowest": "#ffffff",
              "on-tertiary": "#ffffff",
              "inverse-surface": "#2f3037",
              "on-surface": "#1a1b21",
              "on-error": "#ffffff",
              "error-container": "#ffdad6",
              "tertiary-container": "#6c1900",
              tertiary: "#460d00",
              "on-tertiary-fixed": "#3b0900",
              "on-surface-variant": "#444652",
              "on-primary-container": "#809bff",
              "secondary-fixed": "#dce1ff",
              "primary-container": "#002d8f",
              "on-error-container": "#93000a",
              "outline-variant": "#c4c5d4",
              "on-primary-fixed": "#001550",
              "tertiary-fixed-dim": "#ffb5a0",
              "surface-container": "#eeedf6",
              "primary-fixed-dim": "#b6c4ff",
              "tertiary-fixed": "#ffdbd1",
              "on-primary": "#ffffff",
              "on-background": "#1a1b21",
              "surface-dim": "#dad9e2",
              primary: "#001b5f",
              "inverse-primary": "#b6c4ff",
              "on-secondary-fixed": "#0f193c",
              "on-tertiary-fixed-variant": "#81280c",
              "on-secondary": "#ffffff",
              error: "#ba1a1a",
              secondary: "#535d83",
              "on-tertiary-container": "#f67f5c",
              "secondary-container": "#c9d3ff",
              "surface-container-low": "#f4f2fb",
              "inverse-on-surface": "#f1f0f9",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        vertical-align: middle;
      }
    </style>
  </head>
  <body
    class="bg-[#dce1ff]/30 text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed min-h-screen flex items-center justify-center p-4"
  >
    <!-- MODAL CONTAINER -->
    <div
      class="relative bg-white w-full max-w-[640px] rounded-[24px] shadow-[0px_24px_64px_rgba(0,27,95,0.12)] overflow-hidden flex flex-col"
    >
      <!-- Modal Header -->
      <div class="px-10 pt-10 pb-6 flex justify-between items-start">
        <div>
          <h2
            class="font-headline text-[32px] font-extrabold text-[#001b5f] leading-tight"
          >
            Add New Word
          </h2>
          <p class="text-[#444652] text-sm mt-1">
            Expand your curated vocabulary set.
          </p>
        </div>
        <button
          class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors text-[#444652]"
        >
          <span class="material-symbols-outlined text-2xl">close</span>
        </button>
      </div>
      <!-- Modal Body -->
      <div class="px-10 pb-10 space-y-8">
        <!-- Row 1: Word & POS -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label
              class="text-[11px] font-bold text-[#444652] uppercase tracking-[0.1em] ml-1"
              >Word</label
            >
            <input
              class="w-full bg-[#f4f2fb] border-none rounded-xl p-4 focus:ring-2 focus:ring-primary/20 transition-all font-headline font-bold text-[#001b5f] text-lg placeholder:text-[#444652]/30"
              placeholder="e.g. Ephemeral"
              type="text"
            />
          </div>
          <div class="space-y-2 relative">
            <label
              class="text-[11px] font-bold text-[#444652] uppercase tracking-[0.1em] ml-1"
              >Part of Speech</label
            >
            <div class="relative">
              <select
                class="w-full bg-[#f4f2fb] border-none rounded-xl p-4 focus:ring-2 focus:ring-primary/20 transition-all appearance-none cursor-pointer text-[#444652] pr-10"
              >
                <option>Noun</option>
                <option>Verb</option>
                <option selected="">Adjective</option>
                <option>Adverb</option>
                <option>Conjunction</option>
              </select>
              <span
                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-[#444652] pointer-events-none"
                >expand_more</span
              >
            </div>
          </div>
        </div>
        <!-- Row 2: Korean Meaning & Difficulty -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label
              class="text-[11px] font-bold text-[#444652] uppercase tracking-[0.1em] ml-1"
              >Korean Meaning</label
            >
            <input
              class="w-full bg-[#f4f2fb] border-none rounded-xl p-4 focus:ring-2 focus:ring-primary/20 transition-all text-[#444652] placeholder:text-[#444652]/30"
              placeholder="뜻을 입력하세요"
              type="text"
            />
          </div>
          <div class="space-y-2">
            <label
              class="text-[11px] font-bold text-[#444652] uppercase tracking-[0.1em] ml-1"
              >Difficulty Level</label
            >
            <div class="flex p-1 bg-[#f4f2fb] rounded-xl h-[56px] items-center">
              <button
                class="flex-1 h-full text-xs font-bold rounded-lg text-[#444652] hover:bg-white/40 transition-colors"
              >
                L1
              </button>
              <button
                class="flex-1 h-full text-xs font-bold rounded-lg bg-white shadow-sm text-[#001b5f]"
              >
                L2
              </button>
              <button
                class="flex-1 h-full text-xs font-bold rounded-lg text-[#444652] hover:bg-white/40 transition-colors"
              >
                L3
              </button>
              <button
                class="flex-1 h-full text-xs font-bold rounded-lg text-[#444652] hover:bg-white/40 transition-colors"
              >
                L4
              </button>
            </div>
          </div>
        </div>
        <!-- English Meaning -->
        <div class="space-y-2">
          <label
            class="text-[11px] font-bold text-[#444652] uppercase tracking-[0.1em] ml-1"
            >English Meaning</label
          >
          <textarea
            class="w-full bg-[#f4f2fb] border-none rounded-xl p-4 focus:ring-2 focus:ring-primary/20 transition-all resize-none text-[#444652] placeholder:text-[#444652]/30"
            placeholder="Describe the nuanced definition..."
            rows="2"
          ></textarea>
        </div>
        <!-- Synonyms (Tag-style Entry) -->
        <div class="space-y-2">
          <label
            class="text-[11px] font-bold text-[#444652] uppercase tracking-[0.1em] ml-1"
            >Synonyms</label
          >
          <div
            class="w-full bg-[#f4f2fb] rounded-xl p-3 flex flex-wrap gap-2 items-center min-h-[56px]"
          >
            <div
              class="pl-3 pr-2 py-1.5 bg-white text-[#001b5f] rounded-lg text-[13px] font-semibold flex items-center gap-2 shadow-sm border border-black/5"
            >
              transient
              <button
                class="flex items-center justify-center hover:bg-[#f4f2fb] rounded-md p-0.5"
              >
                <span class="material-symbols-outlined text-[16px]">close</span>
              </button>
            </div>
            <div
              class="pl-3 pr-2 py-1.5 bg-white text-[#001b5f] rounded-lg text-[13px] font-semibold flex items-center gap-2 shadow-sm border border-black/5"
            >
              fleeting
              <button
                class="flex items-center justify-center hover:bg-[#f4f2fb] rounded-md p-0.5"
              >
                <span class="material-symbols-outlined text-[16px]">close</span>
              </button>
            </div>
            <input
              class="bg-transparent border-none focus:ring-0 p-1 text-[13px] flex-grow min-w-[150px] text-[#444652] placeholder:text-[#444652]/40"
              placeholder="Add synonym and press Enter..."
              type="text"
            />
          </div>
        </div>
        <!-- Example Sentence -->
        <div class="space-y-2">
          <label
            class="text-[11px] font-bold text-[#444652] uppercase tracking-[0.1em] ml-1"
            >Example Sentence</label
          >
          <textarea
            class="w-full bg-[#f4f2fb] border-none rounded-xl p-4 focus:ring-2 focus:ring-primary/20 transition-all resize-none italic text-[#444652] placeholder:text-[#444652]/30"
            placeholder="Fashions are ephemeral; style is eternal."
            rows="3"
          ></textarea>
        </div>
        <!-- Actions -->
        <div class="flex items-center justify-end gap-6 pt-4">
          <button
            class="text-[15px] font-bold text-[#444652] hover:text-[#001b5f] transition-colors"
          >
            Cancel
          </button>
          <button
            class="px-10 py-4 bg-[#001b5f] text-white text-[15px] font-bold rounded-xl shadow-[0px_8px_24px_rgba(0,27,95,0.2)] hover:bg-[#002d8f] transition-all active:scale-95"
          >
            Save Word
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
